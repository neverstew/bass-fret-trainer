<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bass Trainer</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --wood: #3e2723;
            --fret-wire: #9e9e9e;
            --highlight: #2196f3;
            --correct: #4caf50;
            --error: #f44336;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px 10px;
            user-select: none;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .challenge { font-size: 2rem; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 15px; }
        
        /* Centered Fretboard */
        .fretboard-container { display: flex; justify-content: center; width: 100%; }
        .fretboard {
            display: grid;
            grid-template-columns: 30px repeat(4, 50px);
            grid-template-rows: 30px 40px repeat(12, 50px);
            gap: 0;
            background-color: var(--wood);
            padding: 5px;
            border-radius: 4px;
        }

        .fret-label { display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: #aaa; }
        .string-label { display: flex; align-items: center; justify-content: center; font-weight: bold; color: #777; }
        
        .fret-cell { position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .fret-wire { border-bottom: 2px solid var(--fret-wire); grid-column: 2/6; pointer-events: none; }
        .fret-wire-nut { border-bottom: 6px solid #ddd; grid-column: 2/6; pointer-events: none; }
        
        .string-line { grid-row: 2/15; width: 4px; background: #90a4ae; margin: 0 auto; pointer-events: none; }
        
        .indicator {
            width: 24px; height: 24px; border-radius: 50%; opacity: 0;
            transition: all 0.2s; pointer-events: none;
        }
        .highlight .indicator { background: var(--highlight); opacity: 1; }
        .correct .indicator { background: var(--correct); opacity: 1; }
        .error .indicator { background: var(--error); opacity: 1; }
    </style>
</head>
<body>

    <div class="header">
        <div class="challenge">
            <span id="dir-icon"></span>
            <span id="target-note"></span>
        </div>
    </div>

    <div class="fretboard-container">
        <div class="fretboard" id="fretboard"></div>
    </div>

    <script>
        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const stringBasePitches = [55, 50, 45, 40]; 
        const strings = ['E', 'A', 'D', 'G'];
        const fretboardEl = document.getElementById('fretboard');

        function initFretboard() {
            // Strings (Top)
            strings.forEach((s, i) => {
                let el = document.createElement('div');
                el.className = 'string-label';
                el.style.gridColumn = i + 2;
                el.innerText = s;
                fretboardEl.appendChild(el);
            });

            for (let f = 0; f <= 12; f++) {
                // Fret #
                let label = document.createElement('div');
                label.className = 'fret-label';
                label.innerText = f;
                label.style.gridRow = f + 2;
                fretboardEl.appendChild(label);

                // Wire
                let wire = document.createElement('div');
                wire.className = f === 0 ? 'fret-wire-nut' : 'fret-wire';
                wire.style.gridRow = f + 2;
                fretboardEl.appendChild(wire);

                // Cells
                for(let s=0; s<4; s++) {
                    let cell = document.createElement('div');
                    cell.className = 'fret-cell';
                    cell.dataset.string = 3-s; // Reverse to match EADG order
                    cell.dataset.fret = f;
                    cell.style.gridRow = f + 2;
                    cell.style.gridColumn = s + 2;
                    cell.innerHTML = '<div class="indicator"></div>';
                    cell.addEventListener('click', onFretClick);
                    fretboardEl.appendChild(cell);
                }
            }
        }

        let validAnswers = [], currentPitch = 0;

        function startRound() {
            document.querySelectorAll('.fret-cell').forEach(f => f.className = 'fret-cell');
            const startS = Math.floor(Math.random() * 4), startF = Math.floor(Math.random() * 13);
            currentPitch = stringBasePitches[startS] + startF;
            document.querySelector(`[data-string="${startS}"][data-fret="${startF}"]`).classList.add('highlight');
            
            let targetNote, dir, available = [];
            while(available.length === 0) {
                targetNote = notes[Math.floor(Math.random() * 12)];
                dir = Math.random() > 0.5 ? 1 : -1;
                available = [];
                for(let s=0; s<4; s++) for(let f=0; f<=12; f++) {
                    let p = stringBasePitches[s] + f;
                    if(notes[p%12] === targetNote && (dir === 1 ? p > currentPitch : p < currentPitch)) available.push(p);
                }
            }
            
            const closest = dir === 1 ? Math.min(...available) : Math.max(...available);
            document.getElementById('dir-icon').innerHTML = dir === 1 ? '&#8593;' : '&#8595;';
            document.getElementById('target-note').innerText = targetNote;
            validAnswers = [];
            for(let s=0; s<4; s++) for(let f=0; f<=12; f++) if(stringBasePitches[s]+f === closest) validAnswers.push(`${s}-${f}`);
        }

        function onFretClick(e) {
            const cell = e.currentTarget;
            if(validAnswers.includes(`${cell.dataset.string}-${cell.dataset.fret}`)) {
                cell.classList.add('correct');
                setTimeout(startRound, 400);
            } else { cell.classList.add('error'); setTimeout(() => cell.classList.remove('error'), 400); }
        }

        initFretboard();
        startRound();
    </script>
</body>
</html>
